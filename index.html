<!DOCTYPE html>
<html>
<head>
<title>HT K&KH Reference Ontologies Map</title>
</head>
<body>
<h1>HT K&KH Reference Ontologies Map</h1>
<p><b>Classification note:</b> see <a href="https://dsext001-eu1-215dsi0708-3dswym.3dexperience.3ds.com/community/swym:215dsi0708:DSEXT001:community:JsMPZSruR1Kj88ZS1muhWQ">KKH Wiki</a></p>

<select id="stability">
<option value="">All stability</option>
<option>stable</option>
<option>not stable</option>
</select>

<select id="adoption">
<option value="">All adoption</option>
<option>adopted</option>
<option>watched</option>
<option>rejected</option>
</select>

<div id="results"></div>

<script>
var DATA = [
  {
    "name": "BOT",
    "category": "AI Factory",
    "publisher": "Linked Building Data Community Group",
    "official": "https://w3c-lbd-cg.github.io/bot/",
    "stabilityStatus": "stable",
    "adoptionDecision": "adopted",
    "endObjects": ["AI Factories"],
    "imds": ["Infrastructure System Architecture"],
    "wiki": "https://dsext001-eu1-215dsi0708-3dswym.3dexperience.3ds.com/community/swym:215dsi0708:DSEXT001:community:JsMPZSruR1Kj88ZS1muhWQ",
    "description": "Building Topology Ontology (BOT)",
    "parentOntology": "AI Factory"
  }
];

function render(){
  var s = document.getElementById("stability").value;
  var a = document.getElementById("adoption").value;
  var out="";
  DATA.forEach(d=>{
    if((!s || d.stabilityStatus===s) && (!a || d.adoptionDecision===a)){
      out += "<div><b>"+d.name+"</b> ("+d.stabilityStatus+", "+d.adoptionDecision+")</div>";
    }
  });
  document.getElementById("results").innerHTML = out || "No results";
}

document.getElementById("stability").onchange=render;
document.getElementById("adoption").onchange=render;
render();
</script>
</body>
</html>
