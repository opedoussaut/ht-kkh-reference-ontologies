<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">

<title>HT K&amp;KH Reference Ontologies Map</title>
<style>
  :root {
    --ds-blue:#0b5f8e;
    --ds-blue-dark:#084c72;
    --ds-blue-soft:#eaf3f9;
    --ds-border:#cfd6dd;
    --ds-border-soft:#dde3e8;
    --ds-bg:#f3f5f7;
    --ds-panel:#ffffff;
    --ds-text:#2f3a45;
    --ds-text-soft:#5f6b76;
    --ds-label:#50606f;
    --ds-accent:#f28c18;
    --ds-accent-bg:#f8f3ec;
    --ds-link:#0b6ea8;
    --ds-shadow:0 1px 2px rgba(0,0,0,.05);
    --ds-radius:4px;
  }
  * { box-sizing: border-box; }
  body {
    margin:0;
    background:var(--ds-bg);
    color:var(--ds-text);
    font-family: Arial, Helvetica, sans-serif;
    line-height:1.4;
  }
  .page { width:100%; margin:0; padding:6px; }
  .header {
    background:linear-gradient(180deg, #0d6a9c 0%, #0a5985 100%);
    color:#fff;
    padding:30px 40px;
    border:1px solid #8ca8ba;
    box-shadow:var(--ds-shadow);
  }
  .header h1 { margin:0; font-size:32px; font-weight:700; letter-spacing:.4px; }
  .notice {
    margin-top:14px;
    background:var(--ds-accent-bg);
    border:1px solid var(--ds-border);
    border-left:5px solid var(--ds-accent);
    border-radius:var(--ds-radius);
    padding:16px 20px;
    color:#7b4c14;
    font-size:14px;
  }
  .notice strong { color:#8a5518; }
  .notice a { color:#8a5518; text-decoration:underline; font-weight:700; }
  .panel {
    margin-top:14px;
    background:var(--ds-panel);
    border:1px solid var(--ds-border);
    border-radius:var(--ds-radius);
    padding:22px 22px 18px;
    box-shadow:var(--ds-shadow);
  }
  .filters {
    display:grid;
    grid-template-columns: repeat(6, minmax(180px, 1fr));
    gap:16px;
    align-items:end;
  }
  .field label {
    display:block;
    margin-bottom:8px;
    font-size:12px;
    font-weight:700;
    color:var(--ds-label);
    text-transform:uppercase;
    letter-spacing:.8px;
  }
  .control {
    width:100%;
    height:54px;
    border:1px solid #c7d0d8;
    border-radius:var(--ds-radius);
    background:#fff;
    color:var(--ds-text);
    font-size:16px;
    padding:0 16px;
    outline:none;
  }
  .control:focus {
    border-color:#7caecc;
    box-shadow:0 0 0 2px rgba(11,95,142,.10);
  }
  button.control {
    width:auto;
    min-width:155px;
    padding:0 22px;
    cursor:pointer;
    background:#f3f6f8;
  }
  button.control:hover { background:#eaf0f4; }
  .stats { margin-top:14px; color:#4f5d69; font-size:15px; }
  .stats strong { font-size:18px; color:#394650; }
  #results { margin-top:14px; }
  .section {
    margin-bottom:18px;
    background:var(--ds-panel);
    border:1px solid var(--ds-border);
    border-radius:var(--ds-radius);
    box-shadow:var(--ds-shadow);
    padding:16px;
  }
  .section-title {
    margin:0 0 14px 0;
    font-size:20px;
    font-weight:700;
    color:#395769;
    padding-bottom:10px;
    border-bottom:1px solid var(--ds-border-soft);
  }
  .cards {
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap:14px;
  }
  .card {
    background:#fff;
    border:1px solid #d6dde3;
    border-radius:var(--ds-radius);
    box-shadow:var(--ds-shadow);
    padding:14px 14px 12px;
    display:flex;
    flex-direction:column;
    min-height:280px;
    transition:border-color .15s ease, box-shadow .15s ease, transform .12s ease;
  }
  .card:hover {
    border-color:#9fb8c8;
    box-shadow:0 3px 8px rgba(0,0,0,.08);
    transform:translateY(-1px);
  }
  .card-top {
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:10px;
    margin-bottom:8px;
  }
  .card-title {
    margin:0;
    font-size:20px;
    font-weight:700;
    color:var(--ds-link);
    line-height:1.2;
  }
  .status-row {
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    justify-content:flex-end;
  }
  .status {
    display:inline-block;
    padding:4px 10px;
    border-radius:999px;
    font-size:11px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:.5px;
    border:1px solid transparent;
    white-space:nowrap;
  }
  .status-stable { background:#e9f5ee; color:#246847; border-color:#bfdcc9; }
  .status-not-stable { background:#fdecea; color:#7a2a2a; border-color:#f3c1c1; }
  .status-open { background:#edf5fb; color:#225f88; border-color:#c7ddec; }
  .status-licensed { background:#fff6e8; color:#8a611a; border-color:#ecd49f; }
  .status-restricted { background:#f6eef9; color:#6a3d84; border-color:#dcc7ea; }
  .meta { margin:0 0 8px 0; color:var(--ds-text-soft); font-size:13px; }
  .meta strong { color:#46535f; }
  .desc { font-size:14px; color:#37424c; margin:6px 0 12px; flex:1 1 auto; }
  .group { margin-bottom:10px; }
  .group-label {
    display:block;
    font-size:11px;
    font-weight:700;
    color:var(--ds-label);
    text-transform:uppercase;
    letter-spacing:.7px;
    margin-bottom:6px;
  }
  .badges { display:flex; flex-wrap:wrap; gap:6px; }
  .badge {
    display:inline-block;
    padding:5px 9px;
    font-size:12px;
    border-radius:999px;
    background:var(--ds-blue-soft);
    color:#29506a;
    border:1px solid #cfe0eb;
  }
  .links {
    margin-top:auto;
    padding-top:10px;
    border-top:1px solid #e7edf1;
    display:flex;
    flex-wrap:wrap;
    gap:12px;
  }
  .links a { color:var(--ds-link); text-decoration:none; font-size:14px; font-weight:700; }
  .links a:hover { text-decoration:underline; }
  .empty-state {
    background:#fff;
    border:1px solid var(--ds-border);
    border-radius:var(--ds-radius);
    padding:20px;
    color:var(--ds-text-soft);
    box-shadow:var(--ds-shadow);
  }
  @media (max-width: 1500px) {
    .filters { grid-template-columns: repeat(3, minmax(220px, 1fr)); }
  }
  @media (max-width: 980px) {
    .header { padding:22px 20px; }
    .header h1 { font-size:26px; }
    .panel { padding:16px; }
    .filters { grid-template-columns: 1fr; }
    button.control { width:100%; }
    .cards { grid-template-columns: 1fr; }
  }
</style>
</head>

ent=swym:215dsi0708:DSEXT001:wikitree:R_UEz0okSdC9i1aukoDR3Q", "description": "Alignment layer between SUMO and CORA for robotics semantics.", "parentOntology": "General Purpose Robotics (End-Object Ontology)", "stabilityStatus": "not stable", "usageStatus": "restricted"}];

var CATEGORY_ORDER = [
  "3DS Foundational",
  "Regulatory / Normative",
  "Circularity / Sustainability",
  "High-Tech",
  "AI Factory",
  "Semiconductors",
  "Personal Electronics",
  "General Purpose Robotics"
];

function uniq(values) {
  var seen = {};
  var out = [];
  for (var i = 0; i < values.length; i++) {
    var v = values[i];
    if (v && !seen[v]) {
      seen[v] = true;
      out.push(v);
    }
  }
  out.sort();
  return out;
}

function esc(s) {
  return String(s || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function fillSelect(id, values, allLabel) {
  var el = document.getElementById(id);
  el.innerHTML = "";
  var allOpt = document.createElement("option");
  allOpt.value = "";
  allOpt.textContent = allLabel;
  el.appendChild(allOpt);
  for (var i = 0; i < values.length; i++) {
    var opt = document.createElement("option");
    opt.value = values[i];
    opt.textContent = values[i];
    el.appendChild(opt);
  }
}

function initFilters() {
  fillSelect("category", uniq(DATA.map(function(d){ return d.category; })), "All categories");
  fillSelect("endObject", uniq([].concat.apply([], DATA.map(function(d){ return d.endObjects || []; }))), "All end objects");
  fillSelect("publisher", uniq(DATA.map(function(d){ return d.publisher; })), "All publishers");
  fillSelect("stability", uniq(DATA.map(function(d){ return d.stabilityStatus; })), "All stability levels");
  fillSelect("usage", uniq(DATA.map(function(d){ return d.usageStatus; })), "All usage levels");
}

function containsText(haystack, needle) {
  return haystack.toLowerCase().indexOf(needle.toLowerCase()) !== -1;
}

function matches(d, state) {
  if (state.search) {
    var blob = [
      d.name || "",
      d.description || "",
      d.publisher || "",
      (d.imds || []).join(" "),
      (d.endObjects || []).join(" "),
      d.category || "",
      d.parentOntology || ""
    ].join(" ");
    if (!containsText(blob, state.search)) return false;
  }
  if (state.category && d.category !== state.category) return false;
  if (state.endObject) {
    var eos = d.endObjects || [];
    var foundEndObject = false;
    for (var i = 0; i < eos.length; i++) {
      if (eos[i] === state.endObject) {
        foundEndObject = true;
        break;
      }
    }
    if (!foundEndObject) return false;
  }
  if (state.publisher && d.publisher !== state.publisher) return false;
  if (state.stability && d.stabilityStatus !== state.stability) return false;
  if (state.usage && d.usageStatus !== state.usage) return false;
  return true;
}

function getStabilityClass(value) {
  return value === "stable" ? "status-stable" : "status-not-stable";
}

function getUsageClass(value) {
  if (value === "open") return "status-open";
  if (value === "licensed") return "status-licensed";
  return "status-restricted";
}

function renderCard(d) {
  var endObjects = "";
  var imds = "";
  for (var i = 0; i < (d.endObjects || []).length; i++) {
    endObjects += '<span class="badge">' + esc(d.endObjects[i]) + '</span>';
  }
  for (var j = 0; j < (d.imds || []).length; j++) {
    imds += '<span class="badge">' + esc(d.imds[j]) + '</span>';
  }
  var links = "";
  if (d.wiki) links += '<a href="' + esc(d.wiki) + '" target="_blank" rel="noopener">Wiki page</a>';
  if (d.official) links += '<a href="' + esc(d.official) + '" target="_blank" rel="noopener">Official source</a>';
  return '' +
    '<div class="card">' +
      '<div class="card-top">' +
        '<h3 class="card-title">' + esc(d.name) + '</h3>' +
        '<div class="status-row">' +
          '<span class="status ' + getStabilityClass(d.stabilityStatus) + '">' + esc(d.stabilityStatus) + '</span>' +
          '<span class="status ' + getUsageClass(d.usageStatus) + '">' + esc(d.usageStatus) + '</span>' +
        '</div>' +
      '</div>' +
      '<p class="meta"><strong>Publisher:</strong> ' + esc(d.publisher || "") + '</p>' +
      '<p class="meta"><strong>Parent ontology:</strong> ' + esc(d.parentOntology || "") + '</p>' +
      '<div class="desc">' + esc(d.description || "") + '</div>' +
      '<div class="group">' +
        '<span class="group-label">End Objects</span>' +
        '<div class="badges">' + endObjects + '</div>' +
      '</div>' +
      '<div class="group">' +
        '<span class="group-label">IMDs</span>' +
        '<div class="badges">' + imds + '</div>' +
      '</div>' +
      '<div class="links">' + links + '</div>' +
    '</div>';
}

function render() {
  var state = {
    search: document.getElementById("search").value.replace(/^\s+|\s+$/g, ""),
    category: document.getElementById("category").value,
    endObject: document.getElementById("endObject").value,
    publisher: document.getElementById("publisher").value,
    stability: document.getElementById("stability").value,
    usage: document.getElementById("usage").value
  };

  var filtered = [];
  for (var i = 0; i < DATA.length; i++) {
    if (matches(DATA[i], state)) filtered.push(DATA[i]);
  }

  document.getElementById("stats").innerHTML =
    "<strong>" + filtered.length + "</strong> ontology reference(s) matching the current filters.";

  var results = document.getElementById("results");
  results.innerHTML = "";

  var renderedSectionCount = 0;

  for (var c = 0; c < CATEGORY_ORDER.length; c++) {
    var cat = CATEGORY_ORDER[c];
    var items = [];
    for (var j = 0; j < filtered.length; j++) {
      if (filtered[j].category === cat) items.push(filtered[j]);
    }
    if (!items.length) continue;

    renderedSectionCount++;
    var section = document.createElement("section");
    section.className = "section";
    var title = document.createElement("h2");
    title.className = "section-title";
    title.textContent = cat;
    section.appendChild(title);

    var cards = document.createElement("div");
    cards.className = "cards";
    var cardsHtml = "";
    for (var k = 0; k < items.length; k++) {
      cardsHtml += renderCard(items[k]);
    }
    cards.innerHTML = cardsHtml;
    section.appendChild(cards);
    results.appendChild(section);
  }

  if (renderedSectionCount === 0) {
    var empty = document.createElement("div");
    empty.className = "empty-state";
    empty.textContent = "No ontology matches the current filters.";
    results.appendChild(empty);
  }
}

function bind() {
  var ids = ["search", "category", "endObject", "publisher", "stability", "usage"];
  for (var i = 0; i < ids.length; i++) {
    document.getElementById(ids[i]).addEventListener("input", render);
    document.getElementById(ids[i]).addEventListener("change", render);
  }
  document.getElementById("resetBtn").addEventListener("click", function() {
    document.getElementById("search").value = "";
    document.getElementById("category").value = "";
    document.getElementById("endObject").value = "";
    document.getElementById("publisher").value = "";
    document.getElementById("stability").value = "";
    document.getElementById("usage").value = "";
    render();
  });
}

document.addEventListener("DOMContentLoaded", function() {
  initFilters();
  bind();
  render();
});
</script>
